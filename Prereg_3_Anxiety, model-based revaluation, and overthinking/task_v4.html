    function seededRandom(seed) {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }
    
    function shuffleWithSeed(array, seed) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(seededRandom(seed + i) * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function stringToSeed(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash;

    // ============================================
    // INITIALIZATION
    // ============================================
    function init() { 
        lucide.createIcons(); 
        window.addEventListener('keydown', handleKeyDown); 
        renderConsent(); 
    }

    function handleKeyDown(e) {
        if (e.code === 'Space') { e.preventDefault(); return; }
        
        const learningPhases = ['STRUCTURE_LEARNING', 'STRUCTURE_REMEDIAL', 'VALUE_LEARNING'];
        if (learningPhases.includes(session.phase) && !session.isProcessing) {
            if (e.key === 'ArrowLeft') processMove('left');
            if (e.key === 'ArrowRight') processMove('right');
        }
    }

    // ============================================
    // TIMER FUNCTIONS
    // ============================================
    function startTimer() {
        if (session.subStep > 1) return; 
        clearTimeout(session.timerId);
        session.timerId = setTimeout(handleTimeout, 5000);
    }

    function stopTimer() {
        clearTimeout(session.timerId);
    }

    function handleTimeout() {
        if (session.isProcessing) return;
        session.missedTrials++;
        if (session.missedTrials >= 5) {
            showGameOver();
        } else {
            showTimeoutModal();
        }
    }

    function showTimeoutModal() {
        session.isProcessing = true; 
        // Don't hide HUD - just show the modal on top
        document.getElementById('overlay').classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById('overlay-content').innerHTML = `
            <div class="flex justify-center mb-8"><div class="p-6 bg-red-900/40 border border-red-500/40 rounded-full"><i data-lucide="alert-circle" class="w-16 h-16 text-red-500"></i></div></div>
            <h2 class="text-4xl font-extrabold mb-6 text-white">Too Slow!</h2>
            <p class="text-slate-300 text-xl mb-4">You have <strong>5 seconds</strong> per action.</p>
            <div class="text-6xl font-black text-red-500 mb-8">Strike ${session.missedTrials}/5</div>
            <button id="timeout-confirm" class="action-btn">I Understand</button>
        `;
        lucide.createIcons();
        document.getElementById('timeout-confirm').onclick = () => {
            dismissModal();
            document.getElementById('hud').classList.remove('opacity-0');
            session.isProcessing = false; 
            resetTrial(true);
        };
    }

    function showGameOver() {
        document.getElementById('hud').classList.add('opacity-0');
        document.getElementById('overlay').classList.remove('opacity-0', 'pointer-events-none');
        document.getElementById('overlay-content').innerHTML = `
            <div class="flex justify-center mb-8"><div class="p-6 bg-slate-800 border border-slate-600 rounded-full"><i data-lucide="x-octagon" class="w-16 h-16 text-slate-400"></i></div></div>
            <h2 class="text-4xl font-extrabold mb-6 text-white">Game Over</h2>

            <div class="flex gap-4 justify-center">
                <button onclick="location.reload()" class="action-btn">Restart</button>
                <button onclick="finishAll(true)" class="secondary-btn">Leave</button>
            </div>
        `;
        lucide.createIcons();
    }

    // ============================================
    // GAME MECHANICS
    // ============================================
    function triggerShake() {
        const instr = document.getElementById('instruction-layer');
        gsap.to(instr, { x: 10, duration: 0.05, yoyo: true, repeat: 5, color: '#ef4444', borderColor: '#ef4444' });
        setTimeout(() => {
            gsap.to(instr, { x: 0, color: '#a5b4fc', borderColor: 'rgba(99, 102, 241, 0.3)' });
        }, 300);
    }

    function processMove(dir) {
        let requiredDir = null;
        let trialConfig = null;

        if (session.phase === 'STRUCTURE_LEARNING' && session.trialIndex < 32) {
            trialConfig = CONFIG.structureForced[session.trialIndex];
            requiredDir = (session.subStep === 0) ? trialConfig.step0 : trialConfig.step1;
        } else if (session.phase === 'STRUCTURE_REMEDIAL' && session.trialIndex < 10) {
            trialConfig = CONFIG.structureRemedial[session.trialIndex];
            requiredDir = (session.subStep === 0) ? trialConfig.step0 : trialConfig.step1;
        } else if (session.phase === 'VALUE_LEARNING' && session.trialIndex < 20) {
            trialConfig = CONFIG.valueTrials[session.trialIndex];
            if (trialConfig.type === 'forced') {
                // FORCE BOTH STEPS
                if (session.subStep === 0) requiredDir = trialConfig.step0;
                if (session.subStep === 1) requiredDir = trialConfig.step1;
            }
        }

        if (requiredDir && dir !== requiredDir) {
            triggerShake(); return; 
        }

        stopTimer();
        const rt = Date.now() - session.timestamps.lastAction;
        session.isProcessing = true;
        
        document.getElementById('instruction-layer').style.opacity = "0";
        document.getElementById('state-anchor').style.opacity = "0";

        setTimeout(() => {
            let nextState;
            const intended = CONFIG.transitions[session.currentState][dir];
            const slipState = CONFIG.transitions[session.currentState][dir === 'left' ? 'right' : 'left'];
            let transitionType = 'common';

            if (session.subStep === 0) {
                if (session.phase === 'STRUCTURE_LEARNING') {
                    nextState = CONFIG.structureForced[session.trialIndex].forceM;
                } else if (session.phase === 'STRUCTURE_REMEDIAL') {
                    nextState = CONFIG.structureRemedial[session.trialIndex].forceM;
                } else if (session.phase === 'VALUE_LEARNING') {
                    trialConfig = CONFIG.valueTrials[session.trialIndex];
                    nextState = trialConfig.type === 'forced' ? trialConfig.forceM : intended;
                } else {
                    nextState = intended;
                }
            } else {
                if (session.phase === 'STRUCTURE_LEARNING') {
                    trialConfig = CONFIG.structureForced[session.trialIndex];
                    nextState = trialConfig.forceT;
                    transitionType = trialConfig.transition;
                } else if (session.phase === 'STRUCTURE_REMEDIAL') {
                    trialConfig = CONFIG.structureRemedial[session.trialIndex];
                    nextState = trialConfig.forceT;
                    transitionType = trialConfig.transition;
                } else if (session.phase === 'VALUE_LEARNING') {
                    trialConfig = CONFIG.valueTrials[session.trialIndex];
                    transitionType = trialConfig.transition;
                    // IF FORCED, USE forceT. OTHERWISE USE PROBABILITY.
                    if (trialConfig.type === 'forced' && session.subStep === 1) {
                        nextState = trialConfig.forceT;
                    } else {
                        nextState = (transitionType === 'rare') ? slipState : intended;
                    }
                } else {
                    nextState = intended;
                }
            }

            let prevState = session.currentState;
            session.currentState = nextState;
            session.subStep++;

            // Log data in wide format
            const trialNum = session.trialIndex + 1;
            if (session.phase === 'STRUCTURE_LEARNING') {
                if (session.subStep === 1) {
                    session.data[`SL_T${trialNum}_Step0_Choice`] = dir;
                    session.data[`SL_T${trialNum}_Step0_RT`] = rt;
                } else {
                    session.data[`SL_T${trialNum}_Step1_Choice`] = dir;
                    session.data[`SL_T${trialNum}_Step1_RT`] = rt;
                    session.data[`SL_T${trialNum}_Transition`] = transitionType;
                }
            } else if (session.phase === 'VALUE_LEARNING') {
                if (session.subStep === 1) {
                    session.data[`VL_T${trialNum}_Step0_Choice`] = dir;
                    session.data[`VL_T${trialNum}_Step0_RT`] = rt;
                    session.data[`VL_T${trialNum}_Type`] = CONFIG.valueTrials[session.trialIndex].type;
                } else {
                    session.data[`VL_T${trialNum}_Step1_Choice`] = dir;
                    session.data[`VL_T${trialNum}_Step1_RT`] = rt;
                    session.data[`VL_T${trialNum}_Transition`] = transitionType;
                }
            }

            renderState(); 
            document.getElementById('state-anchor').style.opacity = "1";
            
            // Add 950ms delay on ALL state transitions
            const needsDelay = session.phase === 'STRUCTURE_LEARNING' || 
                              session.phase === 'STRUCTURE_REMEDIAL' || 
                              session.phase === 'VALUE_LEARNING';
            
            if (needsDelay && session.subStep === 1) {
                // Show reward at middle state in value learning
                if (session.phase === 'VALUE_LEARNING') {
                    const pts = (session.currentState === 'M1L') ? 5 : -5;
                    session.score += pts;
                    showRewardOverlay(pts);
                    updatePointsHUD('show');

                    // Threat penalty: free-choice trial that landed at M1R (negative path)
                    if (CONFIG.SHOW_THREAT_INDUCTION
                        && CONFIG.valueTrials[session.trialIndex]?.type === 'free'
                        && session.currentState === 'M1R') {
                        addSpeakingTimePenalty(CONFIG.THREAT_PENALTY_NEG_VISIT_SEC, `VL_T${session.trialIndex + 1}_FreeChoice_M1R`);
                    }
                }
                
                session.isProcessing = true; 
                setTimeout(() => {
                    if (session.phase === 'VALUE_LEARNING') {
                        hideRewardOverlay();
                    }
                    document.getElementById('instruction-layer').style.opacity = "1";
                    session.isProcessing = false; 
                    session.timestamps.lastAction = Date.now();
                    startTimer(); 
                }, 950);
            } else {
                if (session.subStep < 2) document.getElementById('instruction-layer').style.opacity = "1";
                if (session.subStep === 2) {
                    setTimeout(nextTrial, 950); 
                } else {
                    session.isProcessing = false;
                    session.timestamps.lastAction = Date.now();
                    startTimer();
                }
            }
        }, 300);
    }

    function nextTrial() {
        document.getElementById('state-anchor').style.opacity = "0";
        setTimeout(() => {
            session.trialIndex++;
            if (session.phase === 'STRUCTURE_LEARNING' && session.trialIndex >= 32) { startPhase('QUIZ'); return; }
            if (session.phase === 'STRUCTURE_REMEDIAL' && session.trialIndex >= 10) { startPhase('QUIZ'); return; }
            if (session.phase === 'VALUE_LEARNING' && session.trialIndex >= 20) { startPhase('KNOWLEDGE_CHECK'); return; }
            resetTrial();
        }, 500);
    }

    function resetTrial(isRedo = false) {
        session.currentState = 'S';
        session.subStep = 0;
        session.timestamps.lastAction = Date.now();
        session.isProcessing = false; 
        renderState();
        document.getElementById('state-anchor').style.opacity = "1";
        updateHUD();
        startTimer();
    }

    function showRewardOverlay(pts) {
        const el = document.getElementById('reward-display');
        el.innerText = `${pts > 0 ? '+' : ''}${pts}`;
        el.className = pts > 0 ? 'reward-pos' : 'reward-neg';
        gsap.to(el, { opacity: 1, scale: 1.2, duration: 0.3, ease: 'back.out' });
    }

    function hideRewardOverlay() {
        gsap.to(document.getElementById('reward-display'), { opacity: 0, scale: 0.8, duration: 0.3 });
    }

    function renderState() {
        const d = ICONS[session.currentState];
        const anchor = document.getElementById('state-anchor');
        anchor.style.backgroundColor = d.color + '40'; 
        anchor.style.borderColor = d.color;
        document.getElementById('icon-target').innerHTML = `<i data-lucide="${d.icon}" class="w-48 h-48 text-white drop-shadow-2xl"></i>`;
        lucide.createIcons({ root: document.getElementById('icon-target') });

        const instr = document.getElementById('instruction-layer');
        if (session.subStep < 2) {
            let dir = '';
            let isFree = false;
            
            if (session.phase === 'STRUCTURE_LEARNING') {
                dir = (session.subStep === 0) ? CONFIG.structureForced[session.trialIndex].step0 : CONFIG.structureForced[session.trialIndex].step1;
            } else if (session.phase === 'STRUCTURE_REMEDIAL') {
                dir = (session.subStep === 0) ? CONFIG.structureRemedial[session.trialIndex].step0 : CONFIG.structureRemedial[session.trialIndex].step1;
            } else if (session.phase === 'VALUE_LEARNING') {
                const tc = CONFIG.valueTrials[session.trialIndex];
                if (tc.type === 'forced') {
                    // SHOW ARROW FOR BOTH STEPS
                    dir = (session.subStep === 0) ? tc.step0 : tc.step1;
                } else {
                    isFree = true;
                }
            }

            if (isFree) {
                instr.innerHTML = `CHOOSE: <span class="key-cap">←</span> or <span class="key-cap">→</span>`;
            } else {
                instr.innerHTML = `PRESS <span class="key-cap">${dir === 'left' ? '←' : '→'}</span>`;
            }
            instr.style.opacity = "1";
        } else {
            instr.style.opacity = "0";
        }
    }

    function updateHUD() {
        let label = session.phase;
        if (session.phase === 'STRUCTURE_LEARNING') label = 'LEARNING MAP';
        if (session.phase === 'STRUCTURE_REMEDIAL') label = 'RE-LEARNING';
        if (session.phase === 'VALUE_LEARNING') label = 'LEARNING VALUES';
        document.getElementById('phase-label').innerText = label;
    }
    
    function updatePointsHUD(mode) {
        const pointsHUD = document.getElementById('points-hud');
        const pointsLabel = document.getElementById('points-label');
        
        if (mode === 'show') {
            pointsHUD.classList.remove('opacity-0');
            const score = session.score;
            pointsLabel.innerText = score >= 0 ? `+${score}` : score;
            pointsLabel.className = `text-base font-black ${score > 0 ? 'text-green-400' : score < 0 ? 'text-red-400' : 'text-yellow-300'}`;
        } else if (mode === 'hidden') {
            pointsHUD.classList.remove('opacity-0');
            pointsLabel.innerText = 'Revealed at end';
            pointsLabel.className = 'text-base font-black text-slate-400';
        } else {
            pointsHUD.classList.add('opacity-0');
        }
    }

        if (!pill) return;
        const showOn = ['STRUCTURE_LEARNING','STRUCTURE_REMEDIAL','VALUE_LEARNING',
                        'KNOWLEDGE_CHECK','ATTENTION_CHECK',
                        'RATING_1','RATING_2','RATING_3',
                        'REVAL_1_SCREEN','REVAL_1_ACTIVE','REVAL_2_SCREEN','REVAL_2_ACTIVE',
                        'QUERY_1','QUERY_2'];
        const visible = CONFIG.SHOW_THREAT_INDUCTION
                     && CONFIG.SHOW_THREAT_HUD_REMINDER
                     && showOn.includes(session.phase);
        pill.classList.toggle('hidden', !visible);
        if (visible) lucide.createIcons();

            reason, added: seconds,
            before, after: session.earnedSpeakingTimeSec,
            phase: session.phase, t: Date.now() - session.timestamps.start
        });
    }

    function beginTeleAnimation() {
        if (_teleScrollCanceled) return;
        const host = document.getElementById('teleprompter-host');
        if (!host) return;
        const teleBox = host.querySelector('.teleprompter-box');
        const text = document.getElementById('tele-text');
        if (!teleBox || !text) return;

        // Scroll animation — drive by speed (px/sec), end when text fully exits the top
        const boxH = teleBox.offsetHeight;
        const textH = text.offsetHeight;
        const speed = CONFIG.TELEPROMPTER_SCROLL_SPEED_PX_PER_SEC;

        let y = boxH;
        text.style.transform = `translateY(${y}px)`;
        let lastTs = null;

        function step(ts) {
            if (_teleScrollCanceled) return;
            if (lastTs == null) lastTs = ts;
            const dt = (ts - lastTs) / 1000;
            lastTs = ts;
            y -= speed * dt;
            text.style.transform = `translateY(${y}px)`;

            if (y <= -textH) {
                _teleScrollAnimId = null;
                stopTeleSpeechMonitoring();
                stopTeleChatSimulation();
                onTeleprompterFinished();
            } else {
                _teleScrollAnimId = requestAnimationFrame(step);
            }
        }
        _teleScrollAnimId = requestAnimationFrame(step);

        // Live chat
        startTeleChatSimulation();
    }

    function startTeleSpeechMonitoring(onSilence, onReady) {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            // Graceful degradation: skip silence check, log it, proceed without monitoring.
            session.data.Teleprompter_SpeechRecognition_Available = false;
            if (onReady) onReady();
            return;
        }
        session.data.Teleprompter_SpeechRecognition_Available = true;
        _teleRecognition = new SR();
        _teleRecognition.continuous = true;
        _teleRecognition.interimResults = true;
        _teleRecognition.lang = 'en-US';
        _teleLastSpeech = Date.now();

        _teleRecognition.onstart = () => {
            // Mic is now actively listening. Reset the speech timestamp, kick off the
            // watchdog from this moment, and tell the caller it's safe to start scrolling.
            _teleLastSpeech = Date.now();
            if (_teleSilenceWatch) clearInterval(_teleSilenceWatch);
            _teleSilenceWatch = setInterval(() => {
                if (Date.now() - _teleLastSpeech > CONFIG.TELEPROMPTER_SILENCE_TIMEOUT_MS) {
                    stopTeleSpeechMonitoring();
                    onSilence();
                }
            }, 500);
            if (onReady) { onReady(); onReady = null; }
        };
        _teleRecognition.onresult = () => { _teleLastSpeech = Date.now(); };
        _teleRecognition.onerror = (event) => {
            const err = event && event.error;
            if (err === 'not-allowed' || err === 'service-not-allowed') {
                // User denied mic permission (or browser blocked it).
                if (!session.data.Teleprompter_Mic_Denied) session.data.Teleprompter_Mic_Denied = 0;
                session.data.Teleprompter_Mic_Denied++;
                handleTeleMicDenied();
                return;
            }
            // Other errors (network, audio-capture, etc.) → treat as silence so the
            // existing recovery flow runs.
            stopTeleSpeechMonitoring();
            onSilence();
        };

        try {
            _teleRecognition.start();
        } catch (e) {
            // start() can throw InvalidStateError if a previous instance hasn't fully
            // released. Let the caller proceed without monitoring rather than hanging.
            session.data.Teleprompter_SR_Start_Threw = String(e && e.name || 'error');
            if (onReady) { onReady(); onReady = null; }
        }
    }

    function handleTeleMicDenied() {
        _teleScrollCanceled = true;
        if (_teleScrollAnimId) cancelAnimationFrame(_teleScrollAnimId);

    function stopTeleSpeechMonitoring() {
        if (_teleRecognition) {
            _teleRecognition.onresult = null;

            { id: 6, start: 'M1R', action: 'RIGHT', correct: 'T4',  label: 'Triangle + Right' }

        function showQuestion() {
            if (qIdx >= questions.length) {

                }

            }
            
            const q = questions[qIdx];
            const startData = ICONS[q.start];
            const common = CONFIG.transitions[q.start][q.action.toLowerCase()];
            const rare = CONFIG.transitions[q.start][q.action.toLowerCase() === 'left' ? 'right' : 'left'];

            document.getElementById('overlay-content').innerHTML = `

    // ============================================
    // TREE SILHOUETTE (used by reval, reveal, and reflection screens)
    // ============================================
    function renderTreeSilhouette({ mode = 'normal', terminalText = null }) {
        // mode: 'normal' = S+T1-T4 colored with icons, M1L/M1R gray
        //       'allGray' = every node gray placeholder, no icons
        const states = {
            T1: { x: 20,  y: 10,  color: '#22c55e', icon: 'square'     },
            T2: { x: 140, y: 10,  color: '#eab308', icon: 'lamp-floor' },
            T3: { x: 340, y: 10,  color: '#f97316', icon: 'amphora'    },
            T4: { x: 460, y: 10,  color: '#991b1b', icon: 'cloud'      },
            M1L:{ x: 80,  y: 160, color: '#f032e6', icon: 'feather'    },
            M1R:{ x: 400, y: 160, color: '#4363d8', icon: 'triangle'   },
            S:  { x: 240, y: 310, color: '#94a3b8', icon: 'circle'     }
        };
        const boxW = 80, boxH = 100;
        const placeholderColor = '#475569';
        const placeholderBg = 'rgba(30,41,59,0.5)';
        const isAllGray = mode === 'allGray';
        const grayStates = isAllGray ? Object.keys(states) : ['M1L', 'M1R'];
        const terminalKeys = ['T1', 'T2', 'T3', 'T4'];

        // Connecting lines (drawn underneath via SVG)
        const lines = [
            { from: 'S', to: 'M1L' }, { from: 'S', to: 'M1R' },
            { from: 'M1L', to: 'T1' }, { from: 'M1L', to: 'T2' },
            { from: 'M1R', to: 'T3' }, { from: 'M1R', to: 'T4' }
        ];
        const linesHtml = lines.map(l => {
            const f = states[l.from], t = states[l.to];
            const x1 = f.x + boxW/2, y1 = f.y;             // top of source
            const x2 = t.x + boxW/2, y2 = t.y + boxH;      // bottom of target
            return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#475569" stroke-width="2" stroke-linecap="round" />`;
        }).join('');

        const boxesHtml = Object.entries(states).map(([key, s]) => {
            const isGray = grayStates.includes(key);
            const isTerminal = terminalKeys.includes(key);
            let boxStyle, iconHtml = '', valueHtml = '';

            if (isGray) {
                boxStyle = `background:${placeholderBg}; border:3px solid ${placeholderColor};`;
            } else {
                boxStyle = `background:${s.color}40; border:3px solid ${s.color};`;
                iconHtml = `<i data-lucide="${s.icon}" class="w-8 h-8 text-white"></i>`;
            }

            if (isTerminal && terminalText && !isAllGray) {
                const v = terminalText[key];
                if (v !== undefined && v !== null) {
                    let cls = 'text-slate-300', display = v;
                    if (typeof v === 'number') {
                        cls = v > 0 ? 'text-green-400' : v < 0 ? 'text-red-400' : 'text-slate-300';
                        display = v > 0 ? `+${v}` : v;
                    }
                    valueHtml = `<div class="text-xl font-black ${cls} mt-1">${display}</div>`;
                }
            }

            return `<div style="position:absolute; left:${s.x}px; top:${s.y}px; width:${boxW}px; height:${boxH}px; ${boxStyle} border-radius:14px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:8px; box-sizing:border-box;">${iconHtml}${valueHtml}</div>`;
        }).join('');

        return `<div style="position:relative; width:580px; height:420px; margin:0 auto;">
            <svg style="position:absolute; top:0; left:0; width:580px; height:420px; pointer-events:none;">${linesHtml}</svg>
            ${boxesHtml}
        </div>`;
    }

        }

        function onPress() {
            session.data[`R${revalNum}_Reveal_Press_RT`] = Date.now() - screenStart;
            session.data[`R${revalNum}_Reveal_View_Duration`] = 15000;
            const v = session.currentTerminalValues;
            const terminalText = { T1: v.T1, T2: v.T2, T3: v.T3, T4: v.T4 };
            let secs = 15;

            function renderRevealed() {
                document.getElementById('overlay-content').innerHTML = `
                    <div class="text-purple-400 font-bold text-sm mb-3">Revaluation ${revalNum}</div>
                    <h2 class="text-3xl font-black mb-2 text-white">These are the new values from now on</h2>

                    ${renderTreeSilhouette({ mode: 'normal', terminalText })}
                `;
                lucide.createIcons();
            }

            renderRevealed();
            const interval = setInterval(() => {
                secs--;
                if (secs <= 0) {
                    clearInterval(interval);
                    showReflectionCountdown(revalNum);

                    renderRevealed();
                }
            }, 1000);
        }

        renderUnrevealed();

    function showReflectionCountdown(revalNum) {
        let seconds = 10;
        const startTime = Date.now();
        let intervalId = null;
        
        function update() {
            document.getElementById('overlay').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('overlay-content').innerHTML = `
                <h2 class="text-2xl font-bold text-white mb-3">Think About Your Strategy</h2>

                <p class="text-slate-500 text-sm">Continuing in ${seconds} second${seconds !== 1 ? 's' : ''}...</p>
            `;
            
            if (seconds <= 0) {
                clearInterval(intervalId);
                session.data[`Reflection_Time_R${revalNum}_Full`] = (Date.now() - startTime) >= 9500;
                startPhase(revalNum === 1 ? 'RATING_2' : 'RATING_3');
            }
        }
        
        update();
        intervalId = setInterval(() => {
            seconds--;
            update();
        }, 1000);
    }

    // ============================================
    // QUERIES (8 per revaluation)
    // ============================================
    function runQuerySequence(queryNum) {
        let queries = [];
        CONFIG.queryOptionsFeather[queryNum].forEach(v => queries.push({ state: 'M1L', label: 'Feather', fixedValue: v }));
        CONFIG.queryOptionsTriangle[queryNum].forEach(v => queries.push({ state: 'M1R', label: 'Triangle', fixedValue: v }));
        queries = shuffleWithSeed(queries, session.seed + queryNum * 2000);
        
        let idx = 0;
        
        function showQuery() {
            if (idx >= queries.length) {
                startPhase(queryNum === 1 ? 'REVAL_2_SCREEN' : 'DONE');
                return;
            }
            
            const q = queries[idx];
            const icon = ICONS[q.state];
            const trialNum = idx + 1;
            const fixedDisplay = q.fixedValue > 0 ? `+${q.fixedValue}` : q.fixedValue;
            
            document.getElementById('overlay').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('overlay-content').innerHTML = `
                <div class="text-indigo-400 font-bold text-sm mb-4">Decision ${trialNum} of ${queries.length}</div>
                <div class="bg-red-900/30 border border-red-500/40 px-4 py-2 rounded-lg mb-4 inline-block">
                    <span class="text-red-300 text-sm font-bold">⚠️ Attention Check - Answer affects bonus</span>
                </div>
                <h2 class="text-2xl font-bold text-white mb-8">Which would you prefer?</h2>
                <div class="grid grid-cols-2 gap-8 max-w-2xl mx-auto">
                    <div class="query-option cursor-pointer" data-choice="journey">
                        <div class="option-card p-6 h-full">
                            <div class="w-20 h-20 rounded-2xl flex items-center justify-center mb-4" style="background:${icon.color}40;border:3px solid ${icon.color}"><i data-lucide="${icon.icon}" class="w-10 h-10 text-white"></i></div>
                            <p class="text-lg font-bold text-white mb-2">Navigate from ${q.label}</p>
                            <p class="text-sm text-slate-400">Go through ${q.label}, then choose your path.</p>
                        </div>
                    </div>
                    <div class="query-option cursor-pointer" data-choice="fixed">
                        <div class="option-card p-6 h-full">
                            <div class="w-20 h-20 rounded-2xl flex items-center justify-center mb-4 ${q.fixedValue >= 0 ? 'bg-green-500/40 border-green-500' : 'bg-red-500/40 border-red-500'}" style="border-width:3px"><i data-lucide="${q.fixedValue >= 0 ? 'plus' : 'minus'}" class="w-10 h-10 text-white"></i></div>
                            <p class="text-3xl font-black ${q.fixedValue >= 0 ? 'text-green-400' : 'text-red-400'} mb-2">${fixedDisplay}</p>
                            <p class="text-sm text-slate-400">Get ${fixedDisplay} points guaranteed.</p>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
            
            const startTime = Date.now();
            document.querySelectorAll('.query-option').forEach(el => {
                el.onclick = () => {
                    const choseJourney = el.dataset.choice === 'journey';
                    session.data[`Query_${queryNum}_T${trialNum}_State`] = q.label;
                    session.data[`Query_${queryNum}_T${trialNum}_Choice`] = choseJourney ? 1 : 0;
                    session.data[`Query_${queryNum}_T${trialNum}_FixedOffer`] = q.fixedValue;
                    session.data[`Query_${queryNum}_T${trialNum}_RT`] = Date.now() - startTime;

                    // Threat penalty: chose option with lower MB-EV (silently logged)
                    if (CONFIG.SHOW_THREAT_INDUCTION) {
                        const mbEV = CONFIG.MB_EV[queryNum][q.label];
                        const journeyOptimal = mbEV > q.fixedValue;
                        const fixedOptimal  = mbEV < q.fixedValue;
                        const suboptimal = (journeyOptimal && !choseJourney) || (fixedOptimal && choseJourney);
                        session.data[`Query_${queryNum}_T${trialNum}_MB_EV`] = mbEV;
                        session.data[`Query_${queryNum}_T${trialNum}_Suboptimal`] = suboptimal ? 1 : 0;
                        if (suboptimal) {
                            addSpeakingTimePenalty(CONFIG.THREAT_PENALTY_SUBOPTIMAL_QUERY_SEC, `Query_${queryNum}_T${trialNum}`);
                        }
                    }

                    idx++;
                    showQuery();
                };
            });
        }
        showQuery();
    }

        document.getElementById('overlay-content').innerHTML = `
            <h2 class="text-3xl font-extrabold mb-8 tracking-tight text-white text-center">${survey.title}</h2>
            <div class="bg-indigo-900/30 border-l-4 border-indigo-500 p-6 mb-8 rounded-r-xl text-left">
                <p class="text-lg text-indigo-100">${survey.instructions}</p>
            </div>
            <div class="space-y-8 text-left h-[50vh] overflow-y-auto pr-4 custom-scrollbar">
                ${itemsHtml}
            </div>
            <div class="mt-8 text-center"><button onclick="submitSurvey('${surveyKey}')" class="action-btn">Next Section</button></div>
        `;
        
        // Store callback for later
        window.currentSurveyCallback = onComplete;
    }
    
    window.selectLikert = function(surveyKey, qIdx, value, btnElem) {
        currentSurveyAnswers[qIdx] = value;
        const parent = btnElem.parentElement;
        parent.querySelectorAll('.likert-btn').forEach(b => b.classList.remove('selected'));
        btnElem.classList.add('selected');
    };
    
    window.submitSurvey = function(surveyKey) {
        const survey = SURVEY_DATA[surveyKey];
        const totalQs = survey.items.length;
        
        if (Object.keys(currentSurveyAnswers).length < totalQs) { 
            alert("Please answer all questions before continuing."); 
            return; 
        }
        
        // Store individual responses
        for (let i = 0; i < totalQs; i++) {
            session.data[`Survey_${surveyKey}_Q${i + 1}_Raw`] = currentSurveyAnswers[i];
        }
        
        // Calculate total score
        const total = Object.values(currentSurveyAnswers).reduce((a, b) => a + b, 0);
        session.data[`Survey_${surveyKey}_Total_Score`] = total;
        
        // Call the stored callback
        if (window.currentSurveyCallback) {
            window.currentSurveyCallback();
        }
    };

    // ============================================
    // FINISH
    // ============================================
    async function finishAll(abandoned = false) {
        session.data.status = abandoned ? 'ABANDONED' : 'COMPLETED';
        session.data.timestamp_end = new Date().toISOString();
        session.data.total_task_duration_sec = Math.round((Date.now() - session.timestamps.start) / 1000);
        
        // 1. Show user we are saving (Crucial for UX)
        if (!abandoned) {
             const overlay = document.getElementById('overlay');
             overlay.classList.remove('opacity-0', 'pointer-events-none');
             document.getElementById('overlay-content').innerHTML = `
                <div class="flex justify-center mb-8"><div class="animate-spin rounded-full h-16 w-16 border-b-2 border-indigo-500"></div></div>
                <h2 class="text-3xl font-bold text-white text-center">Saving Data...</h2>
                <p class="text-slate-400 text-center mt-2">Connecting to secure database.</p>
             `;
        }

        try {
            // Check if we have a valid User ID. If not, the strict rules will reject us.
            if (!session.firebaseUID) {
                console.warn("UID missing, attempting re-auth...");
                const cred = await auth.signInAnonymously();
                session.firebaseUID = cred.user.uid;
                session.data.firebase_uid = cred.user.uid;
            }
            
            // 2. Attempt Save (Matches your Professor's Rule: UID == DocID)
            await db.collection('experiment_results_v4').doc(session.firebaseUID).set(session.data);
            
            // 3. SUCCESS: Only show this screen if the line above didn't crash
            if (!abandoned) {
                document.getElementById('overlay-content').innerHTML = `
                    <div class="flex justify-center mb-10"><div class="p-6 bg-green-900/40 border border-green-500/40 rounded-full"><i data-lucide="check" class="w-16 h-16 text-green-500"></i></div></div>
                    <h2 class="text-4xl font-black mb-6 text-white">Task Complete!</h2>
                    <p class="text-slate-300 text-xl mb-4">Thank you for participating.</p>
                    <p class="text-slate-400 mb-8">Redirecting to Prolific...</p>
                `;
                lucide.createIcons();
                
                setTimeout(() => { 
                    window.location.href = "https://app.prolific.com/submissions/complete?cc=C1GCESG6"; 
                }, 3000);
            }

        } catch (e) {
            // 4. FAILURE: Do NOT show success screen. Show error and Retry button.
            console.error("Save error:", e);
            
            if (!abandoned) {
                document.getElementById('overlay-content').innerHTML = `
                    <div class="flex justify-center mb-8"><div class="p-6 bg-red-900/40 border border-red-500/40 rounded-full"><i data-lucide="wifi-off" class="w-16 h-16 text-red-500"></i></div></div>
                    <h2 class="text-3xl font-bold text-white mb-4">Data Save Failed</h2>
                    <p class="text-slate-300 mb-6 max-w-lg mx-auto">We couldn't save your results to the secure database.</p>
                    
                    <div class="bg-slate-900 p-4 rounded-lg mb-6 text-left overflow-auto max-h-32 border border-red-500/30">
                        <p class="text-red-400 font-mono text-xs">Error: ${e.message}</p>
                        <p class="text-slate-500 font-mono text-xs mt-1">UID: ${session.firebaseUID || 'null'}</p>
                    </div>

                    <button onclick="finishAll(false)" class="action-btn">Try Saving Again</button>
                `;
                lucide.createIcons();
            }
        }
    }

    document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
